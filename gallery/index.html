<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Benjamin Hoang</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
      background: #111;
      color: #f5f5f5;
    }

    h1 {
      text-align: center;
      margin-bottom: 32px;
    }

    .gallery {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }

    .gallery img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <h1>Photography</h1>

  <div class="gallery">
    <img src="https://hoangben-gallery.s3.us-east-2.amazonaws.com/IMG_2539.jpeg" alt="">
    <img src="https://hoangben-gallery.s3.us-east-2.amazonaws.com/IMG_2892.jpeg" alt="">
    <img src="https://hoangben-gallery.s3.us-east-2.amazonaws.com/IMG_2807.jpg" alt="">
    <img src="https://hoangben-gallery.s3.us-east-2.amazonaws.com/IMG_2600.jpeg" alt="">
    <img src="https://hoangben-gallery.s3.us-east-2.amazonaws.com/IMG_2584.jpeg" alt="">
  </div>
</body>
</html>
